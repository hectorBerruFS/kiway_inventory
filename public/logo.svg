<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <!-- Fondo gradiente -->
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2B9FD9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1E7BA7;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Circulo fondo -->
  <circle cx="128" cy="128" r="128" fill="url(#grad)"/>
  
  <!-- Letra K moderna -->
  <g transform="translate(128, 128)">
    <!-- Vertical línea principal -->
    <line x1="-15" y1="-50" x2="-15" y2="50" stroke="white" stroke-width="22" stroke-linecap="round"/>
    
    <!-- Línea diagonal superior -->
    <line x1="-15" y1="-20" x2="40" y2="-55" stroke="white" stroke-width="18" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- Línea diagonal inferior -->
    <line x1="-15" y1="20" x2="40" y2="55" stroke="white" stroke-width="18" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  
  <!-- Subtexto opcional -->
  <text x="128" y="230" font-family="Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="white" opacity="0.9">
    KIWAY
  </text>
</svg>
